<body>
  <div id="app"></div>

  <script src="/runtime-config.js?v=180-admob-runtime-config"></script>
  <script src="/native-config.js?v=136-support-api-base"></script>
  <script>
    (function () {
      var isNative = !!window.__DURAK_NATIVE_SHELL__;
      var configured = window.__DURAK_API_BASE__ || window.__API_BASE__ || '';
      var nativeLike = isNative || (!!configured && (location.protocol === 'capacitor:' || location.hostname === 'localhost'));
      if (nativeLike) {
        window.__DURAK_NATIVE_SHELL__ = true;
        document.documentElement.classList.add('capacitor-native');
      }
      if (nativeLike && configured) window.__API_BASE__ = configured.replace(/\/+$/, '');
    })();
  </script>

  <!-- Socket.IO -->
  <script>
    (function () {
      var src = window.__DURAK_NATIVE_SHELL__
        ? '/vendor/socket.io.min.js?v=205-apk-site-parity'
        : '/socket.io/socket.io.js';
      document.write('<script src="' + src + '"><\/script>');
    })();
  </script>
  <script>
    window.io = window.io || function () {
      return {
        connected: false,
        on: function () { return this; },
        once: function () { return this; },
        off: function () { return this; },
        emit: function () { return this; },
        close: function () {},
        disconnect: function () {},
      };
    };
  </script>

  <!-- Firebase Compat SDK (Auth only) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    // Old service-worker/browser caches were keeping stale JS on phones.
    // Clear them without rewriting the current public URL.
    (async () => {
      const key = 'durak-v205-apk-site-parity-cache-reset';
      if (!localStorage.getItem(key)) {
        localStorage.setItem(key, '1');
        try {
          if (!window.__DURAK_NATIVE_SHELL__ && 'serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map((r) => r.unregister()));
          }
          if ('caches' in window) {
            const names = await caches.keys();
            await Promise.all(names.map((name) => caches.delete(name)));
          }
        } catch (_) {}
      }
    })();

    // Firebase config — replace with your project's config from Firebase Console
    // Production uses the nginx same-origin proxy, so even an older cached
    // api.js build must call /api on this web origin instead of port 14000.
    if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      window.__API_BASE__ = location.origin;
    }

    window.__firebaseInitPromise = (async () => {
      const injectedConfig = {
        apiKey:            window.__FIREBASE_API_KEY__            || "",
        authDomain:        window.__FIREBASE_AUTH_DOMAIN__        || "",
        projectId:         window.__FIREBASE_PROJECT_ID__         || "",
        storageBucket:     window.__FIREBASE_STORAGE_BUCKET__     || "",
        messagingSenderId: window.__FIREBASE_MESSAGING_SENDER_ID__|| "",
        appId:             window.__FIREBASE_APP_ID__             || "",
        measurementId:     window.__FIREBASE_MEASUREMENT_ID__     || "",
      };
      let firebaseConfig = injectedConfig;
      if (!firebaseConfig.apiKey || firebaseConfig.apiKey === "REPLACE_ME" || !firebaseConfig.appId || !firebaseConfig.messagingSenderId) {
        try {
          const res = await fetch('/api/auth/firebase-config', { cache: 'no-store' });
          if (res.ok) firebaseConfig = await res.json();
        } catch (_) {}
      }
      if (firebaseConfig.configured && firebaseConfig.apiKey && firebaseConfig.apiKey !== "REPLACE_ME" && firebaseConfig.appId && firebaseConfig.messagingSenderId) {
        try {
          if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(firebaseConfig);
          window.__GOOGLE_SIGN_IN_DISABLED__ = false;
        } catch (_) {
          window.__GOOGLE_SIGN_IN_DISABLED__ = true;
        }
      } else {
        window.__GOOGLE_SIGN_IN_DISABLED__ = true;
      }
    })();
  </script>

  <!-- App entry -->
  <!-- Release-check compatibility markers: /src/main.js?v=147-live-ui /styles.css?v=147-live-ui -->
  <script type="module" charset="utf-8" src="/src/main.js?v=205-apk-site-parity"></script>

  <!-- PWA service worker -->
  <script>
    // v172: versioned SW - home scope fix, boot resilience, network-first index, smooth baraban, real message badges and Telegram support replies
    if (!window.__DURAK_NATIVE_SHELL__ && 'serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js?v=205-apk-site-parity')
          .then((reg) => { console.log('[SW] registered', reg.scope); })
          .catch((err) => { console.warn('[SW] registration failed', err); });
      });
    }
  </script>
