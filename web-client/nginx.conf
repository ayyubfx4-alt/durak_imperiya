upstream durak_backend {
  # In docker-compose the backend service is reachable by its service name.
  # Override BACKEND_HOST at build/run time if deploying elsewhere.
  server backend:4000;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;

  # ── Security headers ──────────────────────────────────────────────────────
  # The backend already sets `X-Content-Type-Options`, `X-DNS-Prefetch-Control`
  # etc. via `helmet`, but those only protect API responses. The static
  # bundle (index.html, scripts, manifest) is served directly by nginx so it
  # must carry its own hardened headers. CSP allows the CDNs the index
  # actually loads from (jsdelivr, gstatic, fonts.googleapis.com).
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' ws: wss: http: https:; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self';" always;

  # REST API proxy. The web client now hits same-origin /api/* paths so it
  # works in any deployment (https, custom domain, etc.) without exposing
  # port 4000 publicly.
  location /api/ {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    proxy_set_header Cache-Control "no-store";
    proxy_set_header Pragma "no-cache";
    proxy_pass http://durak_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  # Socket.IO websocket proxy (long-lived upgrade connection).
  location /socket.io/ {
    proxy_pass http://durak_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 86400s;
  }

  # SPA fallback for everything else.
  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    try_files $uri $uri/ /index.html;
  }

  # Firebase env inject: Docker Compose envdan __FIREBASE_* variablarini
  # index.html ga script tagi orqali kiritish (sub_filter nginx module kerak).
  # docker-compose da environment: FIREBASE_API_KEY=$FIREBASE_API_KEY kabi o'rnating.
  sub_filter_once on;
  sub_filter '</head>' '<script>window.__FIREBASE_API_KEY__="";window.__FIREBASE_AUTH_DOMAIN__="";window.__FIREBASE_PROJECT_ID__="";window.__FIREBASE_STORAGE_BUCKET__="";window.__FIREBASE_MESSAGING_SENDER_ID__="";window.__FIREBASE_APP_ID__="";window.__FIREBASE_MEASUREMENT_ID__="";</script></head>';

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    try_files $uri =404;
  }

  # Long-cache static hashed assets, but explicitly opt /src/ JS and the
  # top-level styles.css OUT of caching so users get the latest UI as soon
  # as we ship it. Hashed Phaser/CDN bundles can stay on a long TTL.
  location ~* ^/src/.*\.js$ {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    try_files $uri =404;
  }
  location = /styles.css {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    try_files $uri =404;
  }
  location ~* \.(png|jpg|svg|webp|ico|woff2?)$ {
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }

  # Service worker MUST NOT be cached or it can pin users to a stale build.
  location = /service-worker.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
  }
}
