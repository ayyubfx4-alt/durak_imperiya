# =============================================================================
# docker-compose.prod.yml  —  Production deployment (P2 fix)
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Before first run:
#   1. cp .env.prod.template .env.prod
#   2. Fill in ALL required values (marked REQUIRED)
#   3. Never commit .env.prod to git
#
# Architecture:
#   nginx (443/80) → backend ×2 workers → PostgreSQL + Redis
#   Admin panel served as static files by Nginx.
#
# Scaling workers:
#   docker compose -f docker-compose.prod.yml up -d --scale backend=4
# =============================================================================

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-durak_prod}
      POSTGRES_USER:     ${POSTGRES_USER:-durak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run all migrations on first start.
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-durak} -d ${POSTGRES_DB:-durak_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [internal]
    # Tune for your server RAM (shared_buffers = 25% of RAM).
    command: >
      postgres
        -c shared_buffers=256MB
        -c max_connections=200
        -c effective_cache_size=1GB
        -c work_mem=4MB
        -c log_min_duration_statement=500

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 60 1000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [internal]

  # ── Backend (Node.js) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      NODE_ENV:       production
      PORT:           4000
      LOG_LEVEL:      info
      # Database
      DATABASE_URL:   postgres://${POSTGRES_USER:-durak}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-durak_prod}
      DB_POOL_MAX:    20
      # Redis
      REDIS_URL:      redis://:${REDIS_PASSWORD}@redis:6379
      # JWT — MUST be a long random string in production
      JWT_SECRET:     ${JWT_SECRET:?JWT_SECRET is required}
      # App
      CORS_ORIGIN:    ${CORS_ORIGIN:-https://yourdomain.com}
      # Payments
      STRIPE_SECRET_KEY:    ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # IAP
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_PLAY_PACKAGE_NAME:    ${GOOGLE_PLAY_PACKAGE_NAME:-}
      APPLE_SHARED_SECRET:         ${APPLE_SHARED_SECRET:-}
      # Admin
      ADMIN_PIN:              ${ADMIN_PIN:-2202}
      ADMIN_BOOTSTRAP_EMAIL:  ${ADMIN_EMAIL:-admin@yourdomain.com}
      ADMIN_BOOTSTRAP_PASS:   ${ADMIN_PASSWORD:-}
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health | grep -q '\"status\":\"ok\"'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks: [internal]
    deploy:
      # Run 2 backend instances by default; scale up with --scale backend=N
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M

  # ── Admin panel (static React build) ─────────────────────────────────────
  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    networks: [internal]

  # ── Nginx (SSL termination + reverse proxy) ───────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      # Certbot certificates (Let's Encrypt)
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      # Web client static files
      - ./web-client/public:/srv/webclient:ro
    depends_on:
      - backend
      - admin-panel
    networks: [internal, external]

  # ── Certbot (auto-renew SSL) ──────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Auto-renew twice a day (Let's Encrypt certificates last 90 days).
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"
    networks: [external]

volumes:
  postgres_data:
  redis_data:
  certbot_certs:
  certbot_www:

networks:
  internal:
    driver: bridge
    internal: true    # backend/DB/Redis cannot reach the internet directly
  external:
    driver: bridge
