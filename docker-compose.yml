services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-durak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-durak}
      POSTGRES_DB: ${POSTGRES_DB:-durak}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-durak} -d ${POSTGRES_DB:-durak}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # PRO: Redis for Socket.IO horizontal scaling (pub/sub + presence registry).
  # When REDIS_URL is set on the backend service, multiple backend replicas
  # share state via Redis so 10k+ concurrent sockets can be served by 4+
  # Node.js instances behind a sticky-session load balancer.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--save", "60", "100"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-durak}:${POSTGRES_PASSWORD:-durak}@postgres:5432/${POSTGRES_DB:-durak}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # JWT_SECRET MUST be supplied via .env / deploy pipeline.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set to a strong random value}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-admin@durak.local}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:?ADMIN_BOOTSTRAP_PASSWORD must be set}
      # PRO scaling identity — used by Redis presence/registry & sticky LB.
      INSTANCE_ID: ${INSTANCE_ID:-durak-be-1}
      INSTANCE_PREFIX: ${INSTANCE_PREFIX:-durak-be}
      INSTANCE_COUNT: ${INSTANCE_COUNT:-1}
      PRESENCE_TTL_S: ${PRESENCE_TTL_S:-60}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_GAME_URL: ${TELEGRAM_GAME_URL:-}
      TELEGRAM_BOT_POLLING_ENABLED: ${TELEGRAM_BOT_POLLING_ENABLED:-1}
      TELEGRAM_BOT_INSTANCE_ID: ${TELEGRAM_BOT_INSTANCE_ID:-durak-be-1}
      TELEGRAM_DROP_PENDING_UPDATES: ${TELEGRAM_DROP_PENDING_UPDATES:-0}
    ports:
      - "4000:4000"
    volumes:
      - admin_uploads:/app/uploads

  web-client:
    build:
      context: ./web-client
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    environment:
      # Firebase Web Config — .env faylidan olinadi (docker-compose --env-file .env)
      FIREBASE_API_KEY:             ${FIREBASE_API_KEY:-}
      FIREBASE_AUTH_DOMAIN:         ${FIREBASE_AUTH_DOMAIN:-}
      FIREBASE_PROJECT_ID:          ${FIREBASE_PROJECT_ID:-}
      FIREBASE_STORAGE_BUCKET:      ${FIREBASE_STORAGE_BUCKET:-}
      FIREBASE_MESSAGING_SENDER_ID: ${FIREBASE_MESSAGING_SENDER_ID:-}
      FIREBASE_APP_ID:              ${FIREBASE_APP_ID:-}

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"

  support-panel:
    build:
      context: ./support-panel
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8082:80"

volumes:
  pgdata:
  redisdata:
  admin_uploads:
