apply plugin: 'com.android.application'

def releaseSigningPropertiesFile = rootProject.file('release-signing.properties')
def releaseSigningProperties = new Properties()
if (releaseSigningPropertiesFile.exists()) {
    releaseSigningPropertiesFile.withInputStream { stream ->
        releaseSigningProperties.load(stream)
    }
}

def releaseStoreFile = releaseSigningProperties['storeFile']
    ? rootProject.file(releaseSigningProperties['storeFile'])
    : null
def hasReleaseSigning = releaseStoreFile != null
    && releaseStoreFile.exists()
    && releaseSigningProperties['storePassword']
    && releaseSigningProperties['keyAlias']
    && releaseSigningProperties['keyPassword']

def appVersionCode = (
    project.findProperty('durakVersionCode')
        ?: System.getenv('ANDROID_VERSION_CODE')
        ?: '1'
).toInteger()
def appVersionName = (
    project.findProperty('durakVersionName')
        ?: System.getenv('ANDROID_VERSION_NAME')
        ?: '1.0.0'
).toString()
def resolvedAdmobAppId = (
    project.findProperty('admobAppId')
        ?: System.getenv('ADMOB_ANDROID_APP_ID')
        ?: 'ca-app-pub-3940256099942544~3347511713'
).toString()
def strictStoreRelease = project.hasProperty('strictStoreRelease') || System.getenv('STRICT_STORE_RELEASE') == '1'

android {
    namespace = "com.durakimperia.game"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.durakimperia.game"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode appVersionCode
        versionName appVersionName
        manifestPlaceholders = [
            admobAppId: resolvedAdmobAppId
        ]
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile releaseStoreFile
                storePassword releaseSigningProperties['storePassword']
                keyAlias releaseSigningProperties['keyAlias']
                keyPassword releaseSigningProperties['keyPassword']
            }
        }
    }
    buildTypes {
        release {
            debuggable false
            minifyEnabled true
            shrinkResources true
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    lintOptions {
        checkReleaseBuilds false
        abortOnError false
    }
}

if (strictStoreRelease && (!resolvedAdmobAppId || resolvedAdmobAppId.contains('3940256099942544'))) {
    throw new GradleException('STRICT_STORE_RELEASE requires a real ADMOB_ANDROID_APP_ID. Google sample AdMob ids cannot be used for a store build.')
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
